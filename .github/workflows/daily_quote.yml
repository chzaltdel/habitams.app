name: Daily Quote Update

on:
  schedule:
    # This runs at 16:00 UTC, which is 12:00 AM (Midnight) in the Philippines
    - cron: "0 16 * * *"
  workflow_dispatch: # This adds a "Run" button so you can test it manually

jobs:
  build:
    runs-on: ubuntu-latest
    # This gives the "Robot" permission to write the quote.json file to your repo
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: pip install requests

      - name: Run fetch script
        run: python fetch_quote.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add quote.json
          git commit -m "Automated daily quote update" || exit 0
          git push
